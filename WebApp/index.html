<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HotelDB</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <span class="navbar-brand">Sistema de Reservas</span>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0" id="titulo_formulario">Registro de Huesped</h5>
            </div>
            <div class="card-body">
              <form id="form_huesped">
                <input type="hidden" id="metodo_actual" value="POST" />
                <div class="mb-3">
                  <label class="form-label">ID:</label>
                  <input type="text" id="_id" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Nombre:</label>
                  <input
                    type="text"
                    id="nombre"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Cedula:</label>
                  <input
                    type="text"
                    id="documento"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Correo:</label>
                  <input
                    type="email"
                    id="correo"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Telefono:</label>
                  <input
                    type="text"
                    id="telefono"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Pais:</label>
                  <input
                    type="text"
                    id="pais_origen"
                    class="form-control"
                    required
                  />
                </div>
                <button
                  type="submit"
                  class="btn btn-success w-100"
                  id="btn_guardar"
                >
                  Guardar Registro
                </button>
                <button
                  type="button"
                  class="btn btn-secondary w-100 mt-2 d-none"
                  id="btn_cancelar"
                >
                  Cancelar
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
              <h5 class="mb-0">Huespedes ya registrados</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Nombre</th>
                      <th>Pais</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="tabla_huespedes"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
